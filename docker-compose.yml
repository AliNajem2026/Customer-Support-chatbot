version: "3.9"

services:

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build: .
    command: streamlit run core/app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
